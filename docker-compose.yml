services:
  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env

  agent-worker:
    build: .
    command: python -m clinic_agent.entrypoint start
    env_file: .env
    volumes:
      - agent-worker-logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  api:
    build: .
    command: uvicorn clinic_agent.api.main:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - api-logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  agent-worker-logs:
  api-logs:
